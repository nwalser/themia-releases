name: New widget
description: Suggest a brand-new widget for Themia
labels: ["widget-request"]
body:
  - type: input
    id: widget-name
    attributes:
      label: Widget name
      placeholder: e.g. Spotify, Jira tickets, Google Calendar
    validations:
      required: true

  - type: textarea
    id: what-it-shows
    attributes:
      label: What should the widget show?
      placeholder: |
        A list of my next calendar events, with time and title.
        Click an event to open it in the browser.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this for you?
      options:
        - Nice to have
        - Would use it often
        - Would change whether I keep using Themia
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate request.
          required: true
        - label: I understand this issue is public, and I've left out any private information.
          required: true
