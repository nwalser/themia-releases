name: Bug report
description: Something in Themia is broken or behaving unexpectedly
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this, and for helping make Themia better!

  - type: input
    id: area
    attributes:
      label: Which widget?
      placeholder: e.g. CPU monitor, Calendar, Email, or whole app
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What's wrong?
      placeholder: |
        The CPU widget never shows the temperature, even after I enable it.
        I expected it to appear right after turning it on.
    validations:
      required: true

  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Themia version
      placeholder: v0.14.0
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I'm on the latest version of Themia, or the bug is still present on the latest.
          required: true
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I understand this issue is public, and I've left out any passwords, tokens, or private information.
          required: true
