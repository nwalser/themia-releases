name: Bug report
description: Something in Themia is broken or behaving unexpectedly
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: area
    attributes:
      label: Which widget?
      description: Name the widget this is about, or write "whole app" if it affects Themia in general.
      placeholder: e.g. CPU monitor, Calendar, Email, or whole app
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What's wrong?
      description: What happens, and what did you expect instead? Steps to reproduce help a lot.
      placeholder: |
        The CPU widget never shows the temperature, even after I enable it.
        I expected it to appear right after turning it on.
    validations:
      required: true

  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Themia version
      placeholder: v0.14.0
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else? (optional)
      description: |
        Screenshots or a short video help most. Drop them right here.
        If it's relevant, add: your hardware (system monitor bugs), your monitor resolutions and scaling (Win+D / scaling / disappearing widgets), or the provider (Gmail, Outlook, Nextcloud, IMAP, CalDAV) for email / calendar bugs. Logs live at %APPDATA%\Themia\logs.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I'm on the latest version of Themia, or the bug is still present on the latest.
          required: true
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I understand this issue is public, and I've left out any passwords, tokens, or private information.
          required: true
