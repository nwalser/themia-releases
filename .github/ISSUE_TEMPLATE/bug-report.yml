name: Bug report
description: Something in Themia is broken or behaving unexpectedly
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Which widget or area?
      options:
        - System monitor (CPU / GPU / RAM / Disk / Network)
        - Calendar
        - Email
        - Contacts
        - Folder / file explorer
        - Shortcuts / app launcher
        - Weather / forecast
        - RSS feed
        - GitHub
        - To-do list
        - Clock
        - Media / now playing
        - Unit converter / calculator
        - Claude / Claude Code
        - Appearance / theming / scaling
        - Startup / tray / window behaviour
        - Whole app / not sure
        - Other
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What's wrong?
      description: What happens, and what did you expect instead? Steps to reproduce help a lot.
      placeholder: |
        The CPU widget never shows the temperature, even after I enable it.
        I expected it to appear right after turning it on.
    validations:
      required: true

  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Themia version
      description: Settings -> About shows your version.
      placeholder: v0.14.0
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else? (optional)
      description: |
        Screenshots or a short video help most. Drop them right here.
        If it's relevant, add: your hardware (system monitor bugs), your monitor setup and scaling (Win+D / scaling / disappearing widgets), or the provider (Gmail, Outlook, Nextcloud, IMAP, CalDAV) for email / calendar bugs. Logs live at %APPDATA%\Themia\logs.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I'm on the latest version, and I searched for a duplicate.
          required: true
