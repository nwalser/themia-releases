name: Feature or improvement
description: Suggest an improvement to an existing widget or to the app itself
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! This form is for improving something that already exists — a widget, a setting, or app-wide behaviour.

        Want a brand-new widget that connects to a service (Spotify, Jira, Google Calendar…)? Use the **New widget** form instead.

  - type: dropdown
    id: area
    attributes:
      label: Which widget or area?
      description: What part of Themia would this change?
      options:
        - System monitor (CPU / GPU / RAM / Disk / Network)
        - Calendar
        - Email
        - Contacts
        - Folder / file explorer
        - Shortcuts / app launcher
        - Weather / forecast
        - RSS feed
        - GitHub
        - To-do list
        - Clock
        - Media / now playing
        - Unit converter / calculator
        - Appearance / theming / scaling
        - Startup / tray / window behaviour
        - Layout / views / multi-monitor
        - Whole app / general
        - Other
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to change or add?
      description: Describe the improvement. Mock-ups, screenshots, or examples from other apps are welcome.
      placeholder: |
        Add a toggle to the calendar widget for the start day of the week (Sunday vs Monday).
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: How does it work today?
      description: What's the current behaviour, and why does it fall short for you?
      placeholder: The calendar always starts the week on Monday. I'm used to a Sunday–Saturday layout, so events look shifted from where I expect them.
    validations:
      required: false

  - type: textarea
    id: why
    attributes:
      label: Why would this help?
      description: What problem does it solve? Who else would benefit?
      placeholder: A lot of users (especially in the US) prefer a Sunday start and get thrown off by the current layout.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: How important is this for you?
      options:
        - Nice to have
        - Would use it often
        - Would change whether I keep using Themia
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
