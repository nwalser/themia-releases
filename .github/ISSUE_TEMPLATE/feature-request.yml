name: Feature or improvement
description: Improve an existing widget or the app itself
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Want a brand-new widget that connects to a service? Use the **New widget** form instead.

  - type: input
    id: area
    attributes:
      label: Which widget or area?
      description: Name the widget this is about, or write "whole app" if it's an app-wide setting or behaviour.
      placeholder: e.g. Calendar, Folder, appearance, or whole app
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to change or add?
      description: What should it do, and how does it fall short today? Mock-ups or screenshots welcome.
      placeholder: Add a toggle to the calendar widget for the start day of the week (Sunday vs Monday). Right now it always starts on Monday.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this for you?
      options:
        - Nice to have
        - Would use it often
        - Would change whether I keep using Themia
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
